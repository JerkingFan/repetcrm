# Production: docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# ВАЖНО: реальные пользователи по умолчанию в SQLite volume backend_data.
# Не переключайте на PostgreSQL без явной миграции данных!

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-repetcrm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-repetcrm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/sql/postgresql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-repetcrm} -d ${POSTGRES_DB:-repetcrm}"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles:
      - postgres

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env.production
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/repetcrm.db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MEDIA_DIR: /app/media
    volumes:
      - backend_data:/app/data
      - backend_media:/app/media
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    command: ["arq", "app.worker_settings.WorkerSettings"]
    env_file:
      - .env.production
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/repetcrm.db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MEDIA_DIR: /app/media
    volumes:
      - backend_data:/app/data
      - backend_media:/app/media
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?set public API URL}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_data:
  backend_media:
