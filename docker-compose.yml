services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c", "ollama pull qwen2.5:3b && echo Model ready"]
    restart: "no"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: repetcrm-docker-secret-change-me
      DATABASE_URL: sqlite:///./data/repetcrm.db
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:3b
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://frontend:3000
      CORS_ALLOW_LOCALHOST_REGEX: "true"
      MEDIA_DIR: ./media
      AI_ALLOW_TEMPLATE_FALLBACK: "true"
      REDIS_URL: redis://redis:6379/0
    volumes:
      - backend_data:/app/data
      - backend_media:/app/media
    depends_on:
      redis:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build: ./backend
    command: ["arq", "app.worker_settings.WorkerSettings"]
    environment:
      SECRET_KEY: repetcrm-docker-secret-change-me
      DATABASE_URL: sqlite:///./data/repetcrm.db
      REDIS_URL: redis://redis:6379/0
      MEDIA_DIR: ./media
      AI_ALLOW_TEMPLATE_FALLBACK: "true"
      HOMEWORK_AI_PROVIDER: smart
    volumes:
      - backend_data:/app/data
      - backend_media:/app/media
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_data:
  backend_data:
  backend_media:
